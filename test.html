<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <div
    class="modal fade"
    id="studentaddmodal"
    tabindex="-1"
    role="dialog"
    aria-labelledby="exampleModalLabel"
    aria-hidden="true"
  >
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="exampleModalLabel">Add ALbum</h5>
          <button
            type="button"
            class="close"
            data-dismiss="modal"
            aria-label="Close"
          >
            <span aria-hidden="true">&times;</span>
          </button>
        </div>

        <form >
          <div class="modal-body">
            <div class="form-group">
              <label> ID </label>
              <input
                type="text"
                name="ID"
                id="ID"
                class="form-control"
                placeholder="Enter ID"
              />
            </div>

            <div class="form-group">
              <label> Name </label>
              <input
               
                type="text"
                id="Name"
                class="form-control"
                name="Name"
                min="1975-01-01"
                max="2002-12-31"
                required
              />
            </div>

            <div class="form-group">
              <label> Singer </label>
              <input
                type="text"
                name="Singer"
                id="Singer"
                class="form-control"
                placeholder="Enter Singer"
              />
            </div>
            <div class="form-group">
              <label> Song </label>
              <input
                type="text"
                name="Song"
                id="Song"
                class="form-control"
                placeholder="Enter Song"
              />
            </div>
            <div class="form-group">
              <input type="file" id="Image" name="file" />
            </div>
          </div>
          <div class="modal-footer">
            <button
              id="btnClose"
              type="button"
              class="btn btn-secondary"
              data-dismiss="modal"
            >
              Close
            </button>
            <button id="btnSave"  class="btn btn-primary">
              Save Data
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
